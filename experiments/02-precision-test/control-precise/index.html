<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0f0f1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #00ff41;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .score-board {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 15px;
        }

        #gameCanvas {
            border: 3px solid #00ff41;
            border-radius: 5px;
            background-color: #1a1a2e;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(26, 26, 46, 0.95);
            padding: 40px;
            border-radius: 10px;
            border: 3px solid #ff0044;
            text-align: center;
        }

        #gameOverScreen h2 {
            color: #ff0044;
            font-size: 32px;
            margin-bottom: 20px;
        }

        #gameOverScreen p {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 25px;
        }

        #restartBtn {
            background-color: #00ff41;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        #restartBtn:hover {
            background-color: #00cc33;
        }

        #restartBtn:active {
            transform: scale(0.95);
        }

        .instructions {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Snake</h1>
        <div class="score-board">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOverScreen">
            <h2>Game Over</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
        <p class="instructions">Use arrow keys to control the snake</p>
    </div>

    <script>
        // Game constants
        const CANVAS_SIZE = 400;
        const GRID_SIZE = 20;
        const CELL_SIZE = CANVAS_SIZE / GRID_SIZE;
        const GAME_SPEED = 150;

        // Colors
        const BG_COLOR = '#1a1a2e';
        const SNAKE_COLOR = '#00ff41';
        const FOOD_COLOR = '#ff0044';

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const restartBtn = document.getElementById('restartBtn');

        // Game state
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let gameLoop = null;
        let gameRunning = false;

        // Initialize game
        function initGame() {
            // Snake starts at center, length 3, moving right
            const centerX = Math.floor(GRID_SIZE / 2);
            const centerY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameOverScreen.style.display = 'none';
            spawnFood();
            gameRunning = true;
        }

        // Spawn food at random position
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                // Make sure food doesn't spawn on snake
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Draw food
            ctx.fillStyle = FOOD_COLOR;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = SNAKE_COLOR;
                // Make head slightly brighter
                if (index === 0) {
                    ctx.fillStyle = '#33ff66';
                }
                ctx.fillRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2
                );
            });
        }

        // Update game state
        function update() {
            if (!gameRunning) return;

            // Apply next direction
            direction = { ...nextDirection };

            // Calculate new head position
            const newHead = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameOver();
                return;
            }

            // Add new head
            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
            } else {
                // Remove tail if no food eaten
                snake.pop();
            }
        }

        // Game loop
        function gameLoopFn() {
            update();
            draw();
        }

        // Start game
        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            initGame();
            draw();
            gameLoop = setInterval(gameLoopFn, GAME_SPEED);
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    // Prevent 180-degree reversal
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
            }
        });

        // Restart button
        restartBtn.addEventListener('click', startGame);

        // Start the game
        startGame();
    </script>
</body>
</html>
