name: Auto Merge Fix PRs

on:
  pull_request:
    types: [opened, reopened]
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    if: contains(github.event.pull_request.labels.*.name, 'auto-fix')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI then auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Wait for CI to complete (max 15 min)
          for i in $(seq 1 30); do
            STATUS=$(gh pr checks "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" 2>/dev/null | tail -1)
            if echo "$STATUS" | grep -q "passed\|success"; then
              echo "✅ CI passed"
              break
            fi
            if echo "$STATUS" | grep -q "fail"; then
              echo "❌ CI failed, aborting auto-merge"
              exit 1
            fi
            echo "⏳ Waiting for CI... ($i/30)"
            sleep 30
          done

          # Enable auto-merge
          gh pr merge "$PR_NUMBER" --squash --auto --delete-branch

          # Close related issue
          ISSUE_NUM=$(echo "${{ github.event.pull_request.body }} ${{ github.event.pull_request.title }}" \
            | grep -oP '(?:Fixes|Closes|Resolves)\s+#\K\d+' | head -1)
          if [ -z "$ISSUE_NUM" ]; then
            ISSUE_NUM=$(echo "${{ github.event.pull_request.title }}" | grep -oP '#\d+' | grep -oP '\d+' | head -1)
          fi
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" \
              --comment "✅ 已通过 PR #${PR_NUMBER} 自动修复并部署。感谢反馈！

---
*此 PR 由自动化系统生成并合并。如修复不正确，请回复此 issue 重新打开。*"
          fi
